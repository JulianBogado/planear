server {
    listen 80;
    server_name TU_DOMINIO.com www.TU_DOMINIO.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.com www.TU_DOMINIO.com;

    # SSL — reemplazar con tus certificados (Let's Encrypt recomendado)
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/plane-ar/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Headers de seguridad
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.mercadopago.com; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:" always;

    # SPA: todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets con hash en el nombre (Vite los genera con hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Mantener headers de seguridad también en assets
        add_header X-Content-Type-Options "nosniff" always;
    }

    # No indexar archivos sensibles
    location ~ /\.(env|git|mcp) {
        deny all;
        return 404;
    }
}
